version: '3'
services:
  # Primera instancia de la aplicación Node.js
  web1:
    build: .
    container_name: web1
    ports:
      - "3001:3000"

  # Segunda instancia de la aplicación Node.js
  web2:
    build: .
    container_name: web2
    ports:
      - "3002:3000"

  # NGINX como balanceador de carga
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web1
      - web2
